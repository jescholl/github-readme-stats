name: Build and publish Docker image

on:
  push:
    branches: [ master ]
    # Only tag + build when a change affects the built image. Pushes that touch
    # only docs or CI/workflow config are skipped (no new tag, no image).
    paths:
      - '**'
      - '!**.md'
      - '!.github/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jescholl/readme-stats

permissions:
  contents: write  # for creating tags
  packages: write  # for pushing to ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history required for auto-tag

      - name: Auto-tag
        id: autotag
        uses: phish108/autotag-action@v1.1.64
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          PREV_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')

          gh release create ${{ steps.autotag.outputs.new-tag }} \
            --generate-notes \
            --title "${{ steps.autotag.outputs.new-tag }}"

          # --generate-notes only lists merged PRs; pushes made directly to the
          # default branch (no PR) yield a bare compare-link with no bullets.
          # Fall back to the raw commit log in that case.
          BODY=$(gh release view ${{ steps.autotag.outputs.new-tag }} --json body --jq .body)
          if ! grep -q "## What's Changed" <<< "$BODY"; then
            COMMITS=$(git log --no-merges --pretty="format:* %s (%h)" "${PREV_TAG:+$PREV_TAG..}HEAD")
            NOTES=$(printf "## What's Changed\n%s\n\n%s\n" "$COMMITS" "$BODY")
            gh release edit ${{ steps.autotag.outputs.new-tag }} --notes "$NOTES"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.autotag.outputs.new-tag }}
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
